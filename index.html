  {name:'Aakash Jois',subject:'Economics',atar:'99.95',rank:'#1 in WA',bio:'Aakash achieved the highest Economics mark in Western Australia, scoring 99.5% in the WACE exam and earning the Subject Exhibition. He graduated with a 99.95 ATAR and 2nd in the state overall, as Dux of Perth Modern School, ranked 1st for Economics (in addition to Maths Methods, Chemistry and Japanese). His deep understanding of economic reasoning, combined with the structured exam technique that earned him the top mark in WA, is exactly what he now passes on to his students. Aakash teaches students the analytical frameworks and exam strategy needed to achieve top marks in ATAR Economics.',initials:'AJ',color:'#2563EB'},

  {name:'Aidan Lim',subject:'Chemistry',atar:'99.95',rank:'#1 in WA',bio:'Aidan received the highest Chemistry mark in Western Australia, earning a Subject Exhibition in Chemistry and Maths Methods. He graduated with a 99.95 ATAR and 4th in the state overall, as Dux of Christ Church Grammar School and ranked 1st for Chemistry (alongside Maths Methods, Specialist, Physics and French). He was invited to represent Australia at the International Chemistry Olympiad, and achieved a perfect score in the Australian Chemistry Olympiad. Aidan teaches students how to build real conceptual understanding and the problem-solving skills needed to achieve top marks in ATAR Chemistry.',initials:'AL',color:'#059669'},
  {name:'Cameron Baker',subject:'Physics',atar:'99.90',rank:'#1 in WA',bio:'Cameron achieved the highest Physics result in Western Australia, scoring 99.2% in the WACE Physics exam and earning the Subject Exhibition. He graduated with a 99.90 ATAR. He also placed in the top 0.5% of the state in Mathematics Specialist, reflecting the strong analytical and problem-solving ability that underpins his approach to Physics. His combination of top-level physics knowledge and mathematical rigour gives students a clear advantage in tackling the most demanding ATAR Physics problems. Cameron teaches students how to break down complex problems systematically, and apply the exam techniques needed to achieve top marks in ATAR Physics.',initials:'CB',color:'#DC2626'}

function buildNav(){var n=document.getElementById('navLinks'),m=document.getElementById('mobileMenu'),f=document.getElementById('footerLinks');n.innerHTML='';m.innerHTML='';f.innerHTML='';var labels=Object.keys(PAGE_LABELS);for(var i=0;i<labels.length;i++){var label=labels[i],slug=PAGE_LABELS[label];var btn=document.createElement('button');btn.className='nav-link'+(currentPage===slug?' active':'');btn.textContent=label;btn.setAttribute('data-slug',slug);btn.onclick=function(){navigate(this.getAttribute('data-slug'))};n.appendChild(btn);var mb=document.createElement('button');mb.className='mobile-menu-link'+(currentPage===slug?' active':'');mb.textContent=label;mb.setAttribute('data-slug',slug);mb.onclick=function(){navigate(this.getAttribute('data-slug'));closeMobileMenu()};m.appendChild(mb);var fl=document.createElement('button');fl.className='footer-link';fl.textContent=label;fl.setAttribute('data-slug',slug);fl.onclick=function(){navigate(this.getAttribute('data-slug'))};f.appendChild(fl)}}

function observeFadeIns(){var els=document.querySelectorAll('.fade-in:not(.visible)');var obs=new IntersectionObserver(function(entries){for(var i=0;i<entries.length;i++){if(entries[i].isIntersecting){entries[i].target.classList.add('visible');obs.unobserve(entries[i].target)}}},{threshold:.15});for(var i=0;i<els.length;i++){obs.observe(els[i])}}

function renderHome(){var gV='',gH='';for(var i=0;i<20;i++)gV+='<div class="hero-grid-v" style="left:'+(i%5)*25+'%;top:'+Math.floor(i/5)*25+'%"></div>';for(var i=0;i<16;i++)gH+='<div class="hero-grid-h" style="top:'+(i%4)*25+'%"></div>';var stats=[{n:'99.95',l:'Median Tutor ATAR'},{n:'#1',l:'State Ranked Tutors'},{n:'5',l:'ATAR Subjects'},{n:'100%',l:'WA Focused'}];var sH='';for(var i=0;i<stats.length;i++)sH+='<div class="fade-in" style="transition-delay:'+i*.1+'s"><div class="stat-number">'+stats[i].n+'</div><div class="stat-label">'+stats[i].l+'</div></div>';var tc='';for(var i=0;i<3;i++)tc+=tutorCardSmall(TUTORS[i],i*.12);var sd=[{s:'01',t:'Choose Your Subject',d:'Browse our ATAR subjects and select the areas where you want to achieve top marks.'},{s:'02',t:'Join a Small Group Class',d:'Enter a focused online class taught live by WA\'s #1 ranked student in that subject.'},{s:'03',t:'Master the Course',d:'Learn exam strategies, key concepts, and techniques directly from someone who mastered the course at the highest level.'}];var sh='';for(var i=0;i<sd.length;i++)sh+='<div class="fade-in" style="transition-delay:'+i*.12+'s"><div class="steps-card"><div class="steps-card-number">'+sd[i].s+'</div><div class="steps-card-label">STEP '+sd[i].s+'</div><h3 class="steps-card-title">'+sd[i].t+'</h3><p class="steps-card-desc">'+sd[i].d+'</p></div></div>';return'<section class="hero"><div class="hero-grid">'+gV+gH+'</div><div class="hero-watermark"><svg width="400" height="400" viewBox="0 0 100 100" fill="none"><polygon points="50,5 88,92 12,92" fill="#fff"/><polygon points="50,32 72,85 28,85" fill="#D4AF7A"/></svg></div><div class="hero-content"><div class="hero-label">Western Australia\'s Premier Tutoring</div><h1 class="hero-title">Learn from WA\'s<br><span>#1 Students</span></h1><p class="hero-subtitle">Atlas Tutoring connects students with the top-ranked graduate in each subject in Western Australia, delivering elite online tutoring designed for top academic performance.</p><div class="hero-buttons"><button class="btn btn-gold" onclick="navigate(\'subjects\')">View Subjects</button><button class="btn btn-outline" onclick="navigate(\'tutors\')">Meet the Tutors</button></div></div><div class="hero-scroll"><svg width="20" height="32" viewBox="0 0 20 32" fill="none"><rect x="1" y="1" width="18" height="30" rx="9" stroke="rgba(255,255,255,0.3)" stroke-width="2"/><circle cx="10" cy="10" r="3" fill="#D4AF7A"><animate attributeName="cy" values="10;20;10" dur="2s" repeatCount="indefinite"/></circle></svg></div></section><section class="stats"><div class="stats-grid">'+sH+'</div></section><section class="section" style="background:var(--bg)"><div class="section-inner">'+sectionTitle('Our Tutors','Tutors Who Achieved the Top Rank','Each Atlas tutor is the top ATAR performer in their subject \u2014 recently graduated and ready to share the exact strategies that earned them the highest marks in WA.')+'<div class="grid-3">'+tc+'</div><div class="fade-in" style="text-align:center;margin-top:48px"><button class="btn btn-outline-dark" onclick="navigate(\'tutors\')">View All Tutors \u2192</button></div></div></section>'+goldDivider()+'<section class="section" style="background:var(--white)"><div style="max-width:960px;margin:0 auto">'+sectionTitle('The Atlas Model','How It Works','A simple, powerful approach to elite tutoring.')+'<div class="grid-3" style="grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:40px">'+sh+'</div></div></section><section class="cta-section"><div class="fade-in"><h2 class="cta-title">Ready to Learn from the Best?</h2><p class="cta-subtitle">Join the students who are learning from WA\'s highest achievers.</p><div class="cta-buttons"><button class="btn btn-gold" onclick="navigate(\'subjects\')">Explore Subjects</button><button class="btn btn-outline" onclick="navigate(\'contact\')">Get in Touch</button></div></div></section>'}

function renderSubjects(){var c='';for(var i=0;i<SUBJECTS.length;i++){var s=SUBJECTS[i];c+='<div class="subject-card fade-in" style="transition-delay:'+i*.06+'s"><div class="subject-icon">'+s.icon+'</div><h3 class="subject-name">'+s.name+'</h3><div class="subject-info">Tutor: <strong>'+s.tutor+'</strong></div><div class="subject-info">ATAR '+s.atar+' \u00B7 '+s.rank+'</div></div>'}return'<section class="subpage-section" style="background:var(--bg)"><div class="section-inner" style="padding:0 5%">'+sectionTitle('ATAR Subjects','Choose Your Subject','Each subject is taught exclusively by the highest-ranked student in Western Australia.')+'<div class="grid-4">'+c+'</div></div></section>'}

function renderHowItWorks(){var steps=[{s:'01',t:'Choose Your Subject',d:'Browse our range of ATAR subjects. Each one is taught by the student who achieved the highest score in Western Australia.',dt:'We currently offer 5 core ATAR subjects, with more being added each term.'},{s:'02',t:'Join a Small-Group Online Class',d:'Your child enters a focused online class where they can ask questions and interact in real time.',dt:'All classes are delivered live via Zoom with interactive whiteboards, shared resources, and recorded replays.'},{s:'03',t:'Learn Exam Strategies from the Best',d:'Your tutor doesn\'t just know the content \u2014 they\'ve mastered it at the highest level. Learn the exact techniques, study methods, and exam strategies that earned them the top rank.',dt:'Sessions focus on conceptual clarity, worked examples, past paper strategy, and common mistakes to avoid.'}];var sh='';for(var i=0;i<steps.length;i++){var s=steps[i];sh+='<div class="step-row fade-in" style="transition-delay:'+i*.15+'s"><div class="step-number">'+s.s+'</div><div><h3 class="step-title">'+s.t+'</h3><p class="step-desc">'+s.d+'</p><p class="step-detail">'+s.dt+'</p></div></div>'}var diffs=['Elite Tutors Only','Exam-Focused Learning','Live &amp; Interactive'];var dh='';for(var i=0;i<diffs.length;i++)dh+='<div class="diff-pill"><div class="diff-dot"></div><div class="diff-label">'+diffs[i]+'</div></div>';return'<section class="subpage-section" style="background:var(--white)"><div class="section-narrow" style="padding:0 5%">'+sectionTitle('The Process','How Atlas Tutoring Works','A straightforward path to academic excellence.')+sh+goldDivider()+'<div class="fade-in" style="text-align:center"><h3 style="font-family:\'Cormorant Garamond\',serif;font-size:28px;font-weight:700;color:var(--navy);margin-bottom:12px">What Makes Atlas Different</h3><div class="diff-grid">'+dh+'</div></div></div></section>'}

function renderPricing(){var features=['Live weekly classes with WA\'s #1 ranked tutor','Interactive Q&amp;A every session','Exam strategy &amp; past paper walkthroughs','Recorded replays for revision','Course materials &amp; study resources'];var fh='';for(var i=0;i<features.length;i++)fh+='<div class="pricing-feature">'+checkSvg()+'<span>'+features[i]+'</span></div>';return'<section class="subpage-section" style="background:var(--bg)"><div style="max-width:900px;margin:0 auto;padding:0 5%">'+sectionTitle('Pricing','Invest in Excellence','Transparent pricing for premium tutoring from WA\'s top-ranked students.')+'<div class="fade-in"><div class="pricing-card"><div class="pricing-header"><div class="pricing-label">Weekly Online Classes</div><div class="pricing-amount">$30<span>/session</span></div><div class="pricing-subtitle">Small group classes</div></div><div class="pricing-body">'+fh+'<button class="btn btn-primary btn-full" style="margin-top:28px" onclick="navigate(\'contact\')">Get Started</button></div></div></div><div class="fade-in" style="text-align:center;margin-top:48px;transition-delay:0.2s"><p style="font-family:\'DM Sans\',sans-serif;font-size:14px;color:var(--text-muted)">$300 per subject per term. Contact us for details on specific classes and term schedules.</p></div></div></section>'}

function renderAbout(){var b=[{t:'Exam Strategy',d:'The exact approaches and techniques that earned the top marks in every assessment.'},{t:'Study Methods',d:'How the best students actually study \u2014 not theory, but the real methods they used.'},{t:'Common Mistakes',d:'The pitfalls that cost other students marks, and how to avoid every one of them.'},{t:'The Confidence to Perform',d:'Walk into the exam room knowing you\'ve been taught by someone who already conquered it.'}];var bh='';for(var i=0;i<b.length;i++)bh+='<div class="about-benefit"><div class="about-benefit-bar"></div><h4>'+b[i].t+'</h4><p>'+b[i].d+'</p></div>';return'<section class="subpage-section" style="background:var(--white)"><div style="max-width:760px;margin:0 auto;padding:0 5%">'+sectionTitle('Our Mission','About Atlas Tutoring','')+'<div class="fade-in about-text"><p class="about-lead">The difference between a good ATAR and a great one isn\'t intelligence \u2014 it\'s access. Access to the right strategies, the right techniques, and the right person to learn them from.</p><p>Most tutoring companies hire students who did well. Atlas is different. We only hire the student who did the best \u2014 the one who achieved Subject Exhibition, the #1 rank in their subject in all of Western Australia.</p><p>These tutors sat the exact same exams your child is about to sit. They didn\'t just study the content \u2014 they mastered it at a level no other student in the state could match. And now they\'re passing on everything they know: how to study efficiently, how to structure answers that markers reward, which mistakes to avoid, and how to walk into the exam room with genuine confidence.</p><p>That\'s what Atlas gives your child. Not just a tutor \u2014 a blueprint for how to be the best.</p></div>'+goldDivider()+'<div class="fade-in"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:24px;text-align:center">'+bh+'</div></div></div></section>'}

function renderContact(){return'<section class="subpage-section" style="background:var(--white)"><div style="max-width:600px;margin:0 auto;padding:0 5%">'+sectionTitle('Get in Touch','Contact Atlas Tutoring','Have questions about our classes, pricing, or how Atlas works? We\'d love to hear from you.')+'<div class="fade-in" id="contactFormWrapper"><form class="form-container alt-bg" action="https://formspree.io/f/xbdpbqeg" method="POST"><div class="form-group"><label class="form-label">Name</label><input class="form-input" type="text" name="name" placeholder="Your name" required></div><div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" name="email" placeholder="your email address" required></div><div class="form-group"><label class="form-label">I am a...</label><input class="form-input" type="text" name="role" placeholder="Student / Parent / Other"></div><div class="form-group"><label class="form-label">Message</label><textarea class="form-textarea" rows="4" name="message" placeholder="How can we help?" required></textarea></div><button class="btn btn-primary btn-full" type="submit">Send Message</button></form></div><div class="fade-in" style="text-align:center;margin-top:48px;transition-delay:0.2s"><p style="font-family:\'DM Sans\',sans-serif;font-size:14px;color:var(--text-muted)">You can also reach us at <span style="color:var(--navy);font-weight:600">'+CONTACT_EMAIL+'</span></p></div></div></section>'}
function render(){var app=document.getElementById('app');var r={'home':renderHome,'subjects':renderSubjects,'tutors':renderTutors,'how-it-works':renderHowItWorks,'schedule':renderSchedule,'pricing':renderPricing,'about':renderAbout,'contact':renderContact};var fn=r[currentPage]||renderHome;app.innerHTML=fn();buildNav();updateNavStyle();requestAnimationFrame(function(){observeFadeIns()})}
render();
</script>
